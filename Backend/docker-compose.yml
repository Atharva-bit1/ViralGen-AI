services:
  mongodb:
    image: mongo:7
    container_name: viralgen-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: viralgen_ai
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: viralgen-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mongo_data:
